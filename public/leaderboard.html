<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Weekly BTD Battles 1 medallion leaderboard."
    />
    <title>BTD Battles Stats | Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/leaderboard.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">BTD</span>
        <span class="brand-text">Battles Stats</span>
      </a>
      <button class="menu-btn" id="menuBtn" aria-label="Toggle navigation">
        Menu
      </button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Home</a>
        <a class="active" href="leaderboard.html">Leaderboard</a>
        <a href="player.html">Player Lookup</a>
      </nav>
    </header>

    <main class="container">
      <section class="page-head reveal">
        <div>
          <p class="eyebrow">Weekly Medallions</p>
          <h1>Leaderboard</h1>
        </div>
        <div class="page-actions">
          <button class="btn btn-ghost" id="refreshBtn" type="button">
            Force Refresh
          </button>
        </div>
      </section>

      <section class="card reveal">
        <div class="table-wrap">
          <table class="lb-table" aria-live="polite">
            <thead>
              <tr>
                <th>#</th>
                <th>Player ID</th>
                <th>Username</th>
                <th>Medallions</th>
                <th>Profile</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody">
              <tr>
                <td colspan="5">Loading leaderboard...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p class="muted" id="leaderboardMeta"></p>
        <p class="error" id="leaderboardError" hidden></p>
      </section>
    </main>

    <footer class="site-footer">
      <p>Data may change at any time. Cached via backend for performance.</p>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script src="js/leaderboard.js"></script>
  </body>
</html>
