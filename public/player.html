<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Search BTD Battles 1 player profile by player ID."
    />
    <title>BTD Battles Stats | Player Lookup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/player.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">BTD</span>
        <span class="brand-text">Battles Stats</span>
      </a>
      <button class="menu-btn" id="menuBtn" aria-label="Toggle navigation">
        Menu
      </button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Home</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="past_weeks.html">Past Weeks</a>
        <a href="clans.html">Clans</a>
        <a class="active" href="player.html">Player Lookup</a>
      </nav>
    </header>

    <main class="container">
      <section class="page-head reveal">
        <div>
          <p class="eyebrow">Profile Finder</p>
          <h1>Player Lookup</h1>
        </div>
      </section>

      <section class="card reveal">
        <form id="playerForm" class="player-form" autocomplete="off">
          <label for="playerId">Player ID</label>
          <div class="form-row">
            <input
              id="playerId"
              name="playerId"
              type="text"
              placeholder="Example: 6961315c05aee5fa025f3131"
              required
            />
            <button type="submit" class="btn btn-primary">Load Profile</button>
          </div>
        </form>
        <p class="muted">
          Only player ID lookup is available from public data.
        </p>
        <p class="muted" id="clanJumpWrap" hidden>
          <a id="clanJumpLink" class="mini-link" href="clans.html"
            >Open clan leaderboard</a
          >
        </p>
        <p class="error" id="playerError" hidden></p>
      </section>

      <section class="profile-grid" id="profileGrid" hidden>
        <article class="card profile-main reveal">
          <h2 id="username">Unknown</h2>
          <p class="muted" id="playerIdLabel"></p>
          <div class="chips" id="topStats"></div>
        </article>

        <article class="card reveal">
          <h3>Battle Stats</h3>
          <dl class="stat-list" id="battleStats"></dl>
        </article>

        <article class="card reveal">
          <h3>Meta</h3>
          <dl class="stat-list" id="metaStats"></dl>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <p>Profiles are proxied and cached by your backend endpoint.</p>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script src="js/player.js"></script>
  </body>
</html>
