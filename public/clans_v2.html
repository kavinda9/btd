<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Weekly clan leaderboard for BTD Battles 1."
    />
    <title>BTD Battles Stats | Clan Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="images/extra/blueblood.png" />
    <link rel="apple-touch-icon" href="images/extra/blueblood.png" />
    <link rel="stylesheet" href="css/main.css?v=20260417u" />
    <link rel="stylesheet" href="css/leaderboard.css?v=20260419g" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">BTD</span>
        <span class="brand-text">Battles Stats</span>
      </a>
      <button class="menu-btn" id="menuBtn" aria-label="Toggle navigation">
        Menu
      </button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Home</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="past_weeks.html">Past Weeks</a>
        <a class="active" href="clans_v2.html?v=20260419t">Clans</a>
        <a href="player.html">Lookup</a>
      </nav>
    </header>

    <main class="container">
      <section class="page-head reveal">
        <div>
          <p class="eyebrow">Weekly Medallions</p>
          <h1>Clan Leaderboard</h1>
        </div>
        <div class="page-actions">
          <select
            id="clanType"
            class="btn btn-ghost"
            aria-label="Clan leaderboard type"
          >
            <option value="overall">Overall</option>
            <option value="club">Club</option>
            <option value="standard">Standard</option>
            <option value="card">Card</option>
          </select>
          <button class="btn btn-ghost" id="clanRefreshBtn" type="button">
            Force Refresh
          </button>
        </div>
      </section>

      <section class="card reveal">
        <div class="table-wrap">
          <table class="lb-table" aria-live="polite">
            <tbody id="clanLeaderboardBody">
              <tr>
                <td colspan="3">Loading clan leaderboard...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p class="muted" id="clanLeaderboardMeta"></p>
        <p class="error" id="clanLeaderboardError" hidden></p>
      </section>
    </main>

    <footer class="site-footer">
      <p>Made By KAViNDA &copy;</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js?v=20260419h"></script>
    <script src="js/clan-badge-composer.js?v=20260419e"></script>
    <script src="js/main.js?v=20260419s"></script>
    <script src="js/clans.js?v=20260419m"></script>
  </body>
</html>
