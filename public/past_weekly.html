<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View BTD Battles 1 past weekly player leaderboard by week number."
    />
    <title>BTD Battles Stats | Past Weekly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="images/extra/blueblood.png" />
    <link rel="apple-touch-icon" href="images/extra/blueblood.png" />
    <link rel="stylesheet" href="css/main.css?v=20260417u" />
    <link rel="stylesheet" href="css/leaderboard.css?v=20260417w" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">BTD</span>
        <span class="brand-text">Battles Stats</span>
      </a>
      <button class="menu-btn" id="menuBtn" aria-label="Toggle navigation">
        Menu
      </button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Home</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a class="active" href="past_weeks.html">Past Weeks</a>
        <a href="clans_v2.html?v=20260419t">Clans</a>
        <a href="player.html">Lookup</a>
      </nav>
    </header>

    <main class="container">
      <section class="page-head reveal week-head week-head-split">
        <div>
          <p class="eyebrow">Historical Data</p>
          <h1>Past Weekly Leaderboard</h1>
          <div class="week-info-card" id="pastWeekInfo"></div>
        </div>
        <div class="page-actions week-actions">
          <div class="week-row">
            <label for="weekInput">Week</label>
            <input
              id="weekInput"
              class="week-input"
              type="number"
              min="1"
              step="1"
              value="569"
              aria-label="Week number"
            />
            <button class="btn btn-primary" id="loadWeekBtn" type="button">
              Load Week
            </button>
          </div>
          <div class="week-row">
            <a
              class="btn btn-primary"
              id="openPastWeekly"
              href="past_weekly.html?week=569"
              >Weekly</a
            >
            <a
              class="btn btn-ghost"
              id="openPastPrestige"
              href="past_prestige.html?week=569"
              >Prestige</a
            >
            <a
              class="btn btn-ghost"
              id="openPastClans"
              href="past_clan_overall.html?v=20260419c&week=569"
              >Clan Overall</a
            >
          </div>
        </div>
      </section>

      <p class="error" id="pastError" hidden></p>

      <section class="card reveal leaderboard-section">
        <div class="table-wrap">
          <table class="lb-table lb-colored" aria-live="polite">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Prize</th>
                <th></th>
                <th>Name</th>
                <th>Medallions</th>
              </tr>
            </thead>
            <tbody id="pastBody">
              <tr>
                <td colspan="5">Loading weekly leaderboard...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Made By KAViNDA &copy;</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js?v=20260419s"></script>
    <script src="js/past_weekly.js?v=20260418a"></script>
  </body>
</html>
