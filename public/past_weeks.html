<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Open dedicated past-week pages for weekly, prestige, or clan overall leaderboards."
    />
    <title>BTD Battles Stats | Past Weeks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/leaderboard.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">BTD</span>
        <span class="brand-text">Battles Stats</span>
      </a>
      <button class="menu-btn" id="menuBtn" aria-label="Toggle navigation">
        Menu
      </button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Home</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a class="active" href="past_weeks.html">Past Weeks</a>
        <a href="clans.html">Clans</a>
        <a href="player.html">Player Lookup</a>
      </nav>
    </header>

    <main class="container">
      <section class="page-head reveal">
        <div>
          <p class="eyebrow">Historical Data</p>
          <h1>Past Weeks</h1>
        </div>
        <div class="page-actions week-actions">
          <label for="weekInput">Week</label>
          <input
            id="weekInput"
            class="week-input"
            type="number"
            min="1"
            step="1"
            value="569"
            aria-label="Week number"
          />
          <button class="btn btn-primary" id="loadWeekBtn" type="button">
            Load Week
          </button>
          <button class="btn btn-ghost" id="refreshWeekBtn" type="button">
            Force Refresh
          </button>
        </div>
      </section>

      <section class="card reveal">
        <p class="muted" id="pastWeekMeta">
          Choose what to open for week <span id="selectedWeekText">569</span>.
        </p>
        <p class="error" id="pastWeekError" hidden></p>
        <div class="hero-actions">
          <a
            class="btn btn-primary"
            id="openPastWeekly"
            href="past_weekly.html?week=569"
            >Past Weekly Leaderboard</a
          >
          <a
            class="btn btn-ghost"
            id="openPastPrestige"
            href="past_prestige.html?week=569"
            >Past Prestige Leaderboard</a
          >
          <a
            class="btn btn-ghost"
            id="openPastClans"
            href="past_clan_overall.html?week=569"
            >Past Clan Overall</a
          >
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Historical data is split into dedicated pages for faster loading.</p>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script src="js/past_weeks.js"></script>
  </body>
</html>
